list:
  get:
    summary: List wallpapers (supports pagination)
    description: Return wallpapers, optionally filtered by group and pagination.
    tags:
      - Wallpapers
    parameters:
      - in: query
        name: groupId
        schema:
          type: integer
      - in: query
        name: page
        schema:
          type: integer
      - in: query
        name: limit
        schema:
          type: integer
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: integer
                data:
                  type: array
                  items:
                    $ref: '../components/schemas/wallpaper.yaml#/Wallpaper'
  post:
    summary: Upload wallpaper (multipart/form-data)
    description: Upload a wallpaper image and optionally assign it to a group.
    tags:
      - Wallpapers
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              image:
                type: string
                format: binary
              groupId:
                type: integer
              name:
                type: string
    responses:
      '201':
        description: Created
active:
  get:
    summary: Get active wallpaper
    description: Return the current active wallpaper.
    tags:
      - Wallpapers
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/wallpaper.yaml#/ResponseWallpaper'
random:
  get:
    summary: Get random wallpaper from a group
    description: Return a random wallpaper for the selected group.
    tags:
      - Wallpapers
    parameters:
      - in: query
        name: groupId
        schema:
          type: integer
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/wallpaper.yaml#/ResponseWallpaper'
byId:
  get:
    summary: Get wallpaper by id
    description: Return one wallpaper by id.
    tags:
      - Wallpapers
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../components/schemas/wallpaper.yaml#/ResponseWallpaper'
  put:
    summary: Update wallpaper
    description: Update one wallpaper by id.
    tags:
      - Wallpapers
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../components/schemas/wallpaper.yaml#/WallpaperUpdate'
    responses:
      '200':
        description: OK
  delete:
    summary: Delete wallpaper
    description: Delete one wallpaper by id.
    tags:
      - Wallpapers
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Deleted
move:
  put:
    summary: Move multiple wallpapers to a group
    description: Move wallpapers to another group or clear their group.
    tags:
      - Wallpapers
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              ids:
                type: array
                items:
                  type: integer
              groupId:
                oneOf:
                  - type: integer
                  - type: 'null'
    responses:
      '200':
        description: OK
batchDelete:
  delete:
    summary: Delete multiple wallpapers
    description: Delete multiple wallpapers by id.
    tags:
      - Wallpapers
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              ids:
                type: array
                items:
                  type: integer
    responses:
      '200':
        description: OK
groups:
  get:
    summary: List groups
    description: List wallpaper groups.
    tags:
      - Wallpapers
    responses:
      '200':
        description: OK
  post:
    summary: Create group
    description: Create a wallpaper group.
    tags:
      - Wallpapers
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/wallpaper.yaml#/GroupCreate'
    responses:
      '201':
        description: Created
groupById:
  put:
    summary: Update group
    description: Update a wallpaper group by id.
    tags:
      - Wallpapers
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../components/schemas/wallpaper.yaml#/GroupUpdate'
    responses:
      '200':
        description: OK
  delete:
    summary: Delete group
    description: Delete a wallpaper group by id.
    tags:
      - Wallpapers
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Deleted
groupsCurrent:
  get:
    summary: Get current group
    description: Return the currently selected wallpaper group.
    tags:
      - Wallpapers
    responses:
      '200':
        description: OK

groupsCurrentById:
  put:
    summary: Set current group
    description: Set the current wallpaper group by id.
    tags:
      - Wallpapers
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: OK
